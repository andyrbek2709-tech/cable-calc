<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Расчёт кабелей 1кВ</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: Arial, sans-serif; background: #f1f5f9; }
  .hint-item { border-left: 3px solid #ef4444; padding: 4px 8px; margin: 2px 0; background: #fef2f2; border-radius: 0 4px 4px 0; }
  .method-row:nth-child(even) { background: #f8fafc; }
  input:focus,select:focus { outline: 2px solid #3b82f6; outline-offset: 1px; }
  .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 600; }
  .status-ok    { background: #d1fae5; color: #065f46; }
  .status-error { background: #fee2e2; color: #991b1b; }
  .status-warn  { background: #fef3c7; color: #92400e; }
  details summary { cursor: pointer; user-select: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;

const API = '/api/v1';

// ── Константы ────────────────────────────────────────────────────────────────
const METHODS  = ['A1','A2','B1','B2','C','D1','D2','E','F','G'];
const SECTIONS = [1.5,2.5,4,6,10,16,25,35,50,70,95,120,150,185,240,300,400,500,630];
const METHOD_DESC = {
  'A1':'В трубе в теплоизол. стене','A2':'В трубе в стене','B1':'В трубе открыто',
  'B2':'В трубе в стене','C':'Открыто на стене/лотке','D1':'В земле в трубе',
  'D2':'В земле напрямую','E':'В воздухе многожильный','F':'В воздухе одножильные',
  'G':'В воздухе параллельные'
};

// ── Компонент: поле формы ────────────────────────────────────────────────────
function Field({label, children, tip}) {
  return (
    <div className="flex flex-col gap-0.5">
      <label className="text-xs font-medium text-gray-600">{label}</label>
      {children}
      {tip && <span className="text-xs text-gray-400">{tip}</span>}
    </div>
  );
}

function Input({...p}) {
  return <input className="border rounded px-2 py-1 text-sm bg-white w-full" {...p}/>;
}

function Select({options, ...p}) {
  return (
    <select className="border rounded px-2 py-1 text-sm bg-white w-full" {...p}>
      {options.map(([v,l])=><option key={v} value={v}>{l}</option>)}
    </select>
  );
}

// ── Компонент: карточка результата ───────────────────────────────────────────
function ResultCard({r}) {
  const [showMethod, setShowMethod] = useState(false);
  const cls = r.status==='OK' ? 'status-ok' : r.status==='ERROR' ? 'status-error' : 'status-warn';
  return (
    <div className="rounded-lg border shadow-sm overflow-hidden">
      {/* Шапка */}
      <div className={`flex items-center gap-4 px-4 py-2 ${cls} font-semibold text-sm`}>
        <span className="text-base">{r.status==='OK'?'✓':'✗'} {r.status}</span>
        <span>{r.line_id || 'Кабель'}</span>
        <span className="ml-auto">{r.section_mm2} мм²</span>
      </div>
      {/* Основные показатели */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-2 px-4 py-3 bg-white text-sm">
        {[
          ['Iр', r.i_calc_a?.toFixed(1)+' А'],
          ['Iдоп', r.i_allowable_a?.toFixed(1)+' А'],
          ['ΔU', r.delta_u_pct?.toFixed(2)+'%'],
          ['АВ', r.cb_rating_a+' А'],
          ['IКЗ1ф', r.i_kz_1ph_a?.toFixed(0)+' А'],
          ['IКЗ3ф', r.i_kz_3ph_a?.toFixed(0)+' А'],
          ['k_t', r.k_temp?.toFixed(3)],
          ['k_гр', r.k_group?.toFixed(3)],
        ].map(([lbl,val])=>(
          <div key={lbl} className="flex justify-between border-b pb-1">
            <span className="text-gray-500">{lbl}</span>
            <span className="font-mono font-medium">{val}</span>
          </div>
        ))}
      </div>
      {/* Проверки */}
      <div className="flex gap-3 px-4 py-2 bg-gray-50 text-xs">
        {[['Ток',r.check_current],['Напряжение',r.check_voltage],['КЗ',r.check_kz]].map(([n,ok])=>(
          <span key={n} className={`px-2 py-0.5 rounded-full font-medium ${ok?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}`}>
            {ok?'✓':'✗'} {n}
          </span>
        ))}
      </div>
      {/* Подсказки */}
      {r.hints?.length>0 && (
        <div className="px-4 py-2 bg-white border-t">
          <div className="text-xs font-semibold text-red-600 mb-1">Рекомендации:</div>
          {r.hints.map((h,i)=><div key={i} className="hint-item text-xs">{h}</div>)}
        </div>
      )}
      {/* Методология */}
      {r.methodology && Object.keys(r.methodology).length > 0 && (
        <details className="border-t bg-gray-50">
          <summary className="px-4 py-2 text-xs font-medium text-blue-600 hover:bg-blue-50">
            📐 Методология расчёта
          </summary>
          <div className="px-4 pb-3">
            <table className="w-full text-xs border-collapse">
              <tbody>
                {Object.entries(r.methodology).map(([k,v])=>(
                  <tr key={k} className="method-row border-b">
                    <td className="py-1 pr-3 text-gray-500 whitespace-nowrap w-1/3 font-medium">{k}</td>
                    <td className="py-1 font-mono text-gray-800 break-all">{String(v)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </details>
      )}
    </div>
  );
}

// ── Вкладка: Калькулятор ─────────────────────────────────────────────────────
function CalcTab() {
  const [mode, setMode] = useState('select');
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');
  const [form, setForm] = useState({
    line_id:'', phases:3, power_kw:100, cos_phi:0.85,
    length_m:50, delta_u_pct_max:5, material:'Cu', insulation:'PVC',
    method:'C', cables_nearby:1, ambient_temp_c:30,
    section_mm2:70, soil_resistivity:2.5,
    start_current_ratio:1,
    z_t_mohm:54, r_t_mohm:16.8, x_t_mohm:51.32, u_nom_v:380,
  });

  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const buildPayload = () => ({
    line_id: form.line_id,
    phases: +form.phases,
    power_kw: form.power_kw ? +form.power_kw : null,
    cos_phi: +form.cos_phi,
    length_m: +form.length_m,
    delta_u_pct_max: +form.delta_u_pct_max,
    material: form.material,
    insulation: form.insulation,
    method: form.method,
    cables_nearby: +form.cables_nearby,
    ambient_temp_c: +form.ambient_temp_c,
    section_mm2: (mode !== 'select') ? +form.section_mm2 : null,
    soil_resistivity: +form.soil_resistivity,
    start_current_ratio: +form.start_current_ratio,
    source: {
      z_t_mohm: +form.z_t_mohm, r_t_mohm: +form.r_t_mohm,
      x_t_mohm: +form.x_t_mohm, u_nom_v: +form.u_nom_v,
    },
  });

  const endpoints = {select:'calculate/single', check:'calculate/check', max_load:'calculate/max_load'};

  const calculate = async () => {
    setLoading(true); setError(''); setResult(null);
    try {
      const res = await fetch(`${API}/${endpoints[mode]}`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(buildPayload()),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Ошибка сервера');
      setResult(data);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const modeLabels = {select:'Подбор сечения', check:'Проверка сечения', max_load:'Макс. нагрузка'};

  return (
    <div className="space-y-4">
      {/* Режим */}
      <div className="flex gap-2 flex-wrap">
        {Object.entries(modeLabels).map(([k,l])=>(
          <button key={k} onClick={()=>setMode(k)}
            className={`px-4 py-2 rounded-lg text-sm font-medium transition-colors
              ${mode===k?'bg-blue-600 text-white shadow':'bg-white text-gray-700 border hover:bg-blue-50'}`}>
            {l}
          </button>
        ))}
      </div>

      {/* Форма */}
      <div className="bg-white rounded-xl border shadow-sm p-4">
        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
          <Field label="Обозначение (ID)">
            <Input value={form.line_id} onChange={e=>set('line_id',e.target.value)} placeholder="К-101"/>
          </Field>
          <Field label="Фазы">
            <Select value={form.phases} onChange={e=>set('phases',e.target.value)}
              options={[[1,'1ф'],[3,'3ф']]}/>
          </Field>
          {mode !== 'max_load' && (
            <Field label="Мощность, кВт">
              <Input type="number" value={form.power_kw} onChange={e=>set('power_kw',e.target.value)}/>
            </Field>
          )}
          <Field label="cos φ">
            <Input type="number" step="0.01" min="0.5" max="1" value={form.cos_phi} onChange={e=>set('cos_phi',e.target.value)}/>
          </Field>
          {mode !== 'max_load' && (
            <Field label="Длина, м">
              <Input type="number" value={form.length_m} onChange={e=>set('length_m',e.target.value)}/>
            </Field>
          )}
          {mode !== 'select' && (
            <Field label="Сечение, мм²">
              <Select value={form.section_mm2} onChange={e=>set('section_mm2',e.target.value)}
                options={SECTIONS.map(s=>[s,s+' мм²'])}/>
            </Field>
          )}
          <Field label="Материал">
            <Select value={form.material} onChange={e=>set('material',e.target.value)}
              options={[['Cu','Cu (медь)'],['Al','Al (алюминий)']]}/>
          </Field>
          <Field label="Изоляция">
            <Select value={form.insulation} onChange={e=>set('insulation',e.target.value)}
              options={[['PVC','ПВХ (PVC)'],['XLPE','XLPE (ПЭ)']]}/>
          </Field>
          <Field label="Метод прокладки" tip={METHOD_DESC[form.method]}>
            <Select value={form.method} onChange={e=>set('method',e.target.value)}
              options={METHODS.map(m=>[m,m+' — '+METHOD_DESC[m]])}/>
          </Field>
          <Field label="Кабелей рядом">
            <Input type="number" min="1" max="20" value={form.cables_nearby} onChange={e=>set('cables_nearby',e.target.value)}/>
          </Field>
          <Field label="Темп. окружающей среды, °C">
            <Input type="number" value={form.ambient_temp_c} onChange={e=>set('ambient_temp_c',e.target.value)}/>
          </Field>
          <Field label="Макс. ΔU, %">
            <Input type="number" step="0.5" value={form.delta_u_pct_max} onChange={e=>set('delta_u_pct_max',e.target.value)}/>
          </Field>
        </div>

        {/* Параметры источника */}
        <details className="mt-3">
          <summary className="text-xs font-medium text-gray-500 cursor-pointer hover:text-blue-600">⚡ Параметры источника (трансформатор)</summary>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mt-2">
            {[['z_t_mohm','Zт, мОм'],['r_t_mohm','Rт, мОм'],['x_t_mohm','Xт, мОм'],['u_nom_v','Uн, В']].map(([k,l])=>(
              <Field key={k} label={l}>
                <Input type="number" step="0.01" value={form[k]} onChange={e=>set(k,e.target.value)}/>
              </Field>
            ))}
          </div>
        </details>

        <button onClick={calculate} disabled={loading}
          className="mt-4 w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50
            text-white font-semibold py-2 rounded-lg transition-colors text-sm">
          {loading ? '⏳ Расчёт...' : '▶ Рассчитать'}
        </button>
      </div>

      {error && <div className="bg-red-50 border border-red-200 text-red-700 rounded-lg p-3 text-sm">{error}</div>}
      {result && <ResultCard r={result}/>}
    </div>
  );
}

// ── Вкладка: Журнал ──────────────────────────────────────────────────────────
function JournalTab() {
  const [parsed, setParsed] = useState([]);
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [calcLoading, setCalcLoading] = useState(false);
  const [error, setError] = useState('');
  const [dragOver, setDragOver] = useState(false);
  const [mode, setMode] = useState('select');
  const [globalParams, setGlobalParams] = useState({
    method:'C', material:'Cu', insulation:'PVC',
    ambient_temp_c:30, cos_phi:0.85,
  });

  const uploadFile = async (file) => {
    setLoading(true); setError(''); setParsed([]); setResults([]);
    const fd = new FormData();
    fd.append('file', file);
    try {
      const r = await fetch(`${API}/parse/journal`, {method:'POST', body:fd});
      const data = await r.json();
      if (!r.ok) throw new Error(data.detail || 'Ошибка парсинга');
      setParsed(data);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const calcBatch = async () => {
    setCalcLoading(true); setError('');
    const cables = parsed.filter(r=>r.section_mm2>0||mode==='select').map(r=>({
      line_id: r.cable_id,
      phases: r.phases||3,
      power_kw: null,
      cos_phi: +globalParams.cos_phi,
      length_m: r.length_m||50,
      material: globalParams.material,
      insulation: globalParams.insulation,
      method: globalParams.method,
      cables_nearby: 1,
      ambient_temp_c: +globalParams.ambient_temp_c,
      section_mm2: mode!=='select' ? (r.section_mm2||null) : null,
    }));
    try {
      const r = await fetch(`${API}/calculate/batch`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({mode, cables}),
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.detail || 'Ошибка расчёта');
      setResults(data);
    } catch(e) { setError(e.message); }
    finally { setCalcLoading(false); }
  };

  const downloadReport = async (fmt) => {
    const cables = parsed.filter(r=>r.section_mm2>0||mode==='select').map(r=>({
      line_id:r.cable_id, phases:r.phases||3, power_kw:null,
      cos_phi:+globalParams.cos_phi, length_m:r.length_m||50,
      material:globalParams.material, insulation:globalParams.insulation,
      method:globalParams.method, cables_nearby:1,
      ambient_temp_c:+globalParams.ambient_temp_c,
      section_mm2:mode!=='select'?(r.section_mm2||null):null,
    }));
    const r = await fetch(`${API}/report/${fmt}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({mode, cables}),
    });
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=`cable_calc.${fmt==='excel'?'xlsx':'docx'}`;
    a.click(); URL.revokeObjectURL(url);
  };

  return (
    <div className="space-y-4">
      {/* Drag & Drop */}
      <div
        onDragOver={e=>{e.preventDefault();setDragOver(true)}}
        onDragLeave={()=>setDragOver(false)}
        onDrop={e=>{e.preventDefault();setDragOver(false);uploadFile(e.dataTransfer.files[0])}}
        className={`border-2 border-dashed rounded-xl p-8 text-center transition-colors cursor-pointer
          ${dragOver?'border-blue-400 bg-blue-50':'border-gray-300 bg-white hover:border-blue-300'}`}
        onClick={()=>document.getElementById('jfile').click()}
      >
        <input id="jfile" type="file" accept=".pdf,.xlsx,.xls,.xlsm,.docx,.doc" className="hidden"
          onChange={e=>e.target.files[0]&&uploadFile(e.target.files[0])}/>
        {loading
          ? <p className="text-blue-600 font-medium">⏳ Парсинг файла...</p>
          : <div>
              <p className="text-3xl mb-2">📂</p>
              <p className="font-medium text-gray-700">Перетащите кабельный журнал</p>
              <p className="text-sm text-gray-400">PDF / Excel (.xlsx) / Word (.docx)</p>
            </div>
        }
      </div>

      {error && <div className="bg-red-50 border border-red-200 text-red-700 rounded-lg p-3 text-sm">{error}</div>}

      {/* Результаты парсинга */}
      {parsed.length > 0 && (
        <div className="bg-white rounded-xl border shadow-sm overflow-hidden">
          <div className="flex items-center justify-between px-4 py-2 bg-gray-50 border-b">
            <span className="font-semibold text-sm">Распознано: {parsed.length} строк</span>
            <span className="text-xs text-gray-500">⚠ OCR: для сканов рекомендуется tesseract-rus</span>
          </div>
          <div className="overflow-x-auto max-h-64">
            <table className="w-full text-xs">
              <thead className="bg-blue-900 text-white sticky top-0">
                <tr>{['№','ID','Марка','Сечение','Длина,м','кВ'].map(h=>(
                  <th key={h} className="px-3 py-2 text-left font-medium">{h}</th>
                ))}</tr>
              </thead>
              <tbody>
                {parsed.map((r,i)=>(
                  <tr key={i} className={i%2?'bg-gray-50':''}>
                    <td className="px-3 py-1">{r.row_num}</td>
                    <td className="px-3 py-1 font-medium">{r.cable_id}</td>
                    <td className="px-3 py-1">{r.cable_mark}</td>
                    <td className="px-3 py-1 font-mono">{r.section_str}</td>
                    <td className="px-3 py-1 font-mono">{r.length_m}</td>
                    <td className="px-3 py-1">{r.voltage_kv}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Параметры пакетного расчёта */}
      {parsed.length > 0 && (
        <div className="bg-white rounded-xl border shadow-sm p-4">
          <h3 className="font-semibold text-sm mb-3">Параметры расчёта</h3>
          <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mb-3">
            <Field label="Режим">
              <Select value={mode} onChange={e=>setMode(e.target.value)}
                options={[['select','Подбор сечения'],['check','Проверка'],['max_load','Макс. нагрузка']]}/>
            </Field>
            <Field label="Метод">
              <Select value={globalParams.method} onChange={e=>setGlobalParams(p=>({...p,method:e.target.value}))}
                options={METHODS.map(m=>[m,m])}/>
            </Field>
            <Field label="Материал">
              <Select value={globalParams.material} onChange={e=>setGlobalParams(p=>({...p,material:e.target.value}))}
                options={[['Cu','Cu'],['Al','Al']]}/>
            </Field>
            <Field label="Изоляция">
              <Select value={globalParams.insulation} onChange={e=>setGlobalParams(p=>({...p,insulation:e.target.value}))}
                options={[['PVC','ПВХ'],['XLPE','XLPE']]}/>
            </Field>
            <Field label="Темп, °C">
              <Input type="number" value={globalParams.ambient_temp_c}
                onChange={e=>setGlobalParams(p=>({...p,ambient_temp_c:e.target.value}))}/>
            </Field>
          </div>
          <div className="flex gap-2 flex-wrap">
            <button onClick={calcBatch} disabled={calcLoading}
              className="bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white font-semibold px-4 py-2 rounded-lg text-sm">
              {calcLoading?'⏳ Расчёт...':'▶ Рассчитать все'}
            </button>
            {results.length > 0 && <>
              <button onClick={()=>downloadReport('excel')}
                className="bg-green-600 hover:bg-green-700 text-white font-semibold px-4 py-2 rounded-lg text-sm">
                📥 Excel
              </button>
              <button onClick={()=>downloadReport('word')}
                className="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-4 py-2 rounded-lg text-sm">
                📄 Word
              </button>
            </>}
          </div>
        </div>
      )}

      {/* Таблица результатов */}
      {results.length > 0 && (
        <div className="bg-white rounded-xl border shadow-sm overflow-hidden">
          <div className="px-4 py-2 bg-gray-50 border-b text-sm font-semibold flex gap-4">
            <span>Результатов: {results.length}</span>
            <span className="text-green-600">✓ {results.filter(r=>r.status==='OK').length}</span>
            <span className="text-red-600">✗ {results.filter(r=>r.status!=='OK').length}</span>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-xs">
              <thead className="bg-blue-900 text-white">
                <tr>{['ID','Сечение','Iр,А','Iдоп,А','ΔU%','АВ,А','Статус','Подсказки'].map(h=>(
                  <th key={h} className="px-3 py-2 text-left font-medium">{h}</th>
                ))}</tr>
              </thead>
              <tbody>
                {results.map((r,i)=>{
                  const cls = r.status==='OK'?'status-ok':r.status==='ERROR'?'status-error':'status-warn';
                  return (
                    <tr key={i} className={`border-b ${cls}`}>
                      <td className="px-3 py-1 font-medium">{r.line_id}</td>
                      <td className="px-3 py-1 font-mono">{r.section_mm2}</td>
                      <td className="px-3 py-1 font-mono">{r.i_calc_a?.toFixed(1)}</td>
                      <td className="px-3 py-1 font-mono">{r.i_allowable_a?.toFixed(1)}</td>
                      <td className="px-3 py-1 font-mono">{r.delta_u_pct?.toFixed(2)}</td>
                      <td className="px-3 py-1 font-mono">{r.cb_rating_a}</td>
                      <td className="px-3 py-1 font-semibold">{r.status}</td>
                      <td className="px-3 py-1 text-red-700">{r.hints?.join('; ')}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Вкладка: Методология ─────────────────────────────────────────────────────
function MethodTab() {
  const blocks = [
    {title:'1. Расчётный ток',
     content:`3ф: Iр = P / (√3 · U · cosφ) · 1000
1ф: Iр = P / (U/√3 · cosφ) · 1000
Где: P — мощность (кВт), U — напряжение (380В), cosφ — cos φ`},
    {title:'2. Допустимый ток кабеля',
     content:`Iz = Iz0 · k_t · k_gr · k_s
Iz0 — табличное значение (таблицы B.52.2–B.52.21 МЭК 60364-5-52)
k_t  — поправка на температуру (таб. B.52.14 для воздуха, B.52.15 для грунта)
k_gr — поправка на группирование (таб. B.52.17 для воздуха, B.52.18–19 для земли)
k_s  — поправка на удельное сопротивление грунта (таб. B.52.16)
Условие: Iz ≥ Iр`},
    {title:'3. Падение напряжения',
     content:`3ф: ΔU = √3 · Iр · L · (r0·cosφ + x0·sinφ) / U · 100%
1ф: ΔU = 2 · Iр · L · (r0·cosφ + x0·sinφ) / U · 100%
r0 = r20 · (1 + α·(t-20)) / 1000  — сопр. при рабочей темп. (мОм/м)
x0 = 0.08 мОм/м (типовое для кабелей 0.4кВ)
α_Cu = 0.00393, α_Al = 0.00403
Рабочая темп: PVC=70°C, XLPE=90°C
Условие: ΔU ≤ ΔUmax (обычно 5%)`},
    {title:'4. Токи короткого замыкания',
     content:`1ф: Iкз = Uф / (Zт + 2·Rф·l)
3ф: Iкз = Uн / (√3 · Zт)
Zт = √(Rт²+Xт²) — сопротивление трансформатора (мОм)
Rф = r0 · L / 1000 — сопротивление фазного проводника (Ом)
Проверка: Iкз1ф · 1.1 > Iот_АВ (ток отсечки)`},
    {title:'5. Выбор автоматического выключателя',
     content:`Iн_АВ ≥ Iр — номинальный ток не менее расчётного
Iн_АВ ≤ Iz / 1.05 — не превышает допустимый с коэффициентом
Iот ≥ kпуск · Iр — ток отсечки ≥ пускового тока
Стандартный ряд: 6, 10, 16, 20, 25, 32, 40, 50, 63, 80, 100, 125, 160, 200, 250, 315, 400 А`},
    {title:'6. Методы прокладки (МЭК 60364-5-52)',
     content: METHODS.map(m=>`${m}: ${METHOD_DESC[m]}`).join('\n')},
    {title:'7. Стандартные сечения',
     content: SECTIONS.map(s=>s+' мм²').join('  |  ')},
  ];

  return (
    <div className="space-y-3">
      <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 text-sm text-blue-800">
        Методика расчёта по <strong>МЭК 60364-5-52</strong> (IEC 60364-5-52 «Электрические установки зданий»)
      </div>
      {blocks.map(b=>(
        <details key={b.title} open className="bg-white rounded-xl border shadow-sm overflow-hidden">
          <summary className="px-4 py-3 font-semibold text-sm cursor-pointer hover:bg-gray-50 select-none">
            {b.title}
          </summary>
          <pre className="px-4 pb-4 text-xs text-gray-700 leading-relaxed whitespace-pre-wrap font-mono bg-gray-50 border-t">
            {b.content}
          </pre>
        </details>
      ))}
    </div>
  );
}

// ── Главный компонент ────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('calc');
  const tabs = [{k:'calc',l:'🔧 Калькулятор'},{k:'journal',l:'📋 Журнал'},{k:'method',l:'📐 Методология'}];

  return (
    <div className="min-h-screen">
      {/* Хедер */}
      <header className="bg-gradient-to-r from-blue-900 to-blue-700 text-white px-4 py-3 shadow-lg">
        <div className="max-w-6xl mx-auto flex items-center gap-3">
          <span className="text-2xl">⚡</span>
          <div>
            <h1 className="font-bold text-lg leading-tight">Расчёт кабелей до 1кВ</h1>
            <p className="text-blue-200 text-xs">МЭК 60364-5-52 · Подбор сечения · Проверка · Журналы</p>
          </div>
        </div>
      </header>

      {/* Табы */}
      <div className="bg-white border-b shadow-sm">
        <div className="max-w-6xl mx-auto flex">
          {tabs.map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)}
              className={`px-5 py-3 text-sm font-medium transition-colors hover:bg-blue-50
                ${tab===t.k?'tab-active border-b-2':'text-gray-600 border-b-2 border-transparent'}`}>
              {t.l}
            </button>
          ))}
        </div>
      </div>

      {/* Контент */}
      <main className="max-w-6xl mx-auto px-4 py-6">
        {tab==='calc'    && <CalcTab/>}
        {tab==='journal' && <JournalTab/>}
        {tab==='method'  && <MethodTab/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
